name: Check FiveM Builds

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if images already exist'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

concurrency:
  group: fivem-check
  cancel-in-progress: false

jobs:
  check:
    name: Check FiveM artifacts
    runs-on: ubuntu-latest
    outputs:
      recommended: ${{ steps.check.outputs.recommended }}
      latest: ${{ steps.check.outputs.latest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new FiveM builds
        id: check
        run: |
          chmod +x fivem-check.sh
          OUTPUT=$(bash fivem-check.sh)
          echo "$OUTPUT" > build-info.json

          RECOMMENDED=$(echo "$OUTPUT" | jq -r '.recommended_build.name')
          LATEST=$(echo "$OUTPUT" | jq -r '.latest_build.name')

          if [[ -z "$RECOMMENDED" || "$RECOMMENDED" == "null" ]]; then
            echo "::error::Failed to parse recommended_build from script output"
            exit 1
          fi
          if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
            echo "::error::Failed to parse latest_build from script output"
            exit 1
          fi

          echo "recommended=$RECOMMENDED" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          echo "### Build Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | Build |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Recommended | \`$RECOMMENDED\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest | \`$LATEST\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build info artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ github.run_number }}
          path: build-info.json
          retention-days: 7

  build-recommended:
    needs: check
    uses: azdolinski/fivem/.github/workflows/build.yml@main
    with:
      build: ${{ needs.check.outputs.recommended }}
      is_latest: false
      force: ${{ inputs.force == 'true' }}
    secrets: inherit

  build-latest:
    needs: check
    uses: azdolinski/fivem/.github/workflows/build.yml@main
    with:
      build: ${{ needs.check.outputs.latest }}
      is_latest: true
      force: ${{ inputs.force == 'true' }}
    secrets: inherit
